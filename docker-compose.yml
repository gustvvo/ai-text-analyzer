services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_text_analyzer
    ports:
      # Host port for local tooling (migrations, psql). Override with
      # POSTGRES_PORT if 5432 is already taken on your machine.
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    # Optional local overrides (AI provider keys, AI_PROVIDER, models).
    # Values in `environment:` below take precedence over the file.
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/ai_text_analyzer
      CORS_ORIGIN: http://localhost:5173
      JWT_SECRET: dev-secret-change-me-please
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      # Same host port the dev server uses, so the README URL and the
      # backend's CORS_ORIGIN work identically in both modes.
      - "5173:8080"
    depends_on:
      - backend

volumes:
  postgres_data:
